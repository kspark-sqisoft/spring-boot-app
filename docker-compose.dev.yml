# 개발: Gradle bootRun + Vite (볼륨 마운트, 핫 리로드)
# 사용: docker compose -f docker-compose.dev.yml up
# 프로덕션 compose 와 겹치지 않도록 프로젝트 이름 분리
name: spring-board-dev

services:
  db:
    image: postgres:16-alpine
    container_name: spring-board-db-dev
    environment:
      POSTGRES_USER: ${DB_USERNAME:-board}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-board}
      POSTGRES_DB: ${DB_NAME:-board}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    # 이미지에 박힌 엔트리포인트는 up 만으로 갱신되지 않음. 호스트 스크립트를 쓰고 sh 로 실행(+x 불필요).
    entrypoint: ['sh', '/usr/local/bin/docker-dev-entrypoint.sh']
    container_name: spring-board-api-dev
    ports:
      - '3000:3000'
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-board}
      DB_PASSWORD: ${DB_PASSWORD:-board}
      DB_NAME: ${DB_NAME:-board}
      SERVER_PORT: 3000
      GRADLE_USER_HOME: /gradle-cache
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-study_board_jwt_access_dev_key_32chars_min!!}
      JWT_ACCESS_EXPIRES_MINUTES: ${JWT_ACCESS_EXPIRES_MINUTES:-15}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-7}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      UPLOADS_DIR: /app/uploads
      # 개발 스택은 .env 의 CORS_ORIGIN 을 쓰지 않습니다(잘못된 값이면 403 Invalid CORS 만 반복됨).
      # 항상 비워 두어 백엔드가 allowedOriginPattern("*") 로 동작하게 합니다.
      CORS_ORIGIN: ''
    volumes:
      - ./backend:/app
      - ./backend/docker-dev-entrypoint.sh:/usr/local/bin/docker-dev-entrypoint.sh:ro
      - gradle_cache:/gradle-cache
      - backend_uploads_dev:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:3000/api/health >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: spring-board-web-dev
    ports:
      - '5173:5173'
      - '8080:5173'
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000
      DOCKER_DEV: 'true'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data_dev:
  gradle_cache:
  frontend_node_modules:
  backend_uploads_dev:
