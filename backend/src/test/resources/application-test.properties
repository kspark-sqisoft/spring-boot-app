# 통합 테스트 전용: 인메모리 H2 + 고정 JWT 시크릿 + 임시 업로드 경로
spring.datasource.url=jdbc:h2:mem:board_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.access-secret=test_jwt_access_secret_key_32bytes_min!!
app.jwt.access-expiration-minutes=60

app.auth.refresh-cookie-name=refresh_token
app.auth.refresh-expires-days=7
app.auth.refresh-cookie-secure=false

app.uploads.dir=${java.io.tmpdir}/board-test-uploads
