spring.application.name=board

server.port=${SERVER_PORT:3000}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:board}
spring.datasource.username=${DB_USERNAME:board}
spring.datasource.password=${DB_PASSWORD:board}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=12MB

# JWT access (HS256)
app.jwt.access-secret=${JWT_ACCESS_SECRET:study_board_jwt_access_dev_key_32chars_min!!}
app.jwt.access-expiration-minutes=${JWT_ACCESS_EXPIRES_MINUTES:15}

# Refresh cookie (httpOnly)
app.auth.refresh-cookie-name=${REFRESH_COOKIE_NAME:refresh_token}
app.auth.refresh-expires-days=${JWT_REFRESH_EXPIRES_DAYS:7}
app.auth.refresh-cookie-secure=${REFRESH_COOKIE_SECURE:false}

app.uploads.dir=${UPLOADS_DIR:uploads}

# CORS: comma-separated origins; empty = reflect request Origin (dev convenience)
app.cors.allowed-origins=${CORS_ORIGIN:}
